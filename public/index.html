<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Hub | Centralized Management</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="briefcase"></i>
                    <span>Business Hub</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-view="summary">
                    <i data-lucide="bar-chart-3"></i>
                    <span>Health Summary</span>
                </button>
                <button class="nav-item" data-view="hr">
                    <i data-lucide="users"></i>
                    <span>HR & Personal</span>
                </button>
                <button class="nav-item" data-view="logs">
                    <i data-lucide="history"></i>
                    <span>Activity Log</span>
                </button>
            </nav>
            <!-- Sidebar Footer Removed -->
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-text">
                    <h1 id="view-title">Dashboard Overview</h1>
                    <p id="view-desc">Monitor organizational performance in real-time.</p>
                </div>
                <div class="header-actions">
                    <button id="add-task-global" class="btn btn-primary">
                        <i data-lucide="plus"></i>
                        <span>New Task</span>
                    </button>
                </div>
            </header>

            <div id="content-area" class="content-area">
                <!-- Dashboard Content (Modules) -->
                <div id="dashboard-view" class="view active">
                    <div class="module-grid" id="module-grid">
                        <!-- Module Cards will be injected here -->
                    </div>
                </div>

                <!-- Summary Health View -->
                <div id="summary-view" class="view">
                    <div class="summary-stats" id="summary-stats">
                        <!-- Stats Summary will be injected here -->
                    </div>
                    <div class="summary-blocks" id="summary-blocks">
                        <!-- Detailed Module Health will be injected here -->
                    </div>
                </div>

                <!-- HR & Personnel View -->
                <div id="hr-view" class="view">
                    <div class="hr-header">
                        <h2>Team Management</h2>
                        <button id="add-personal-btn" class="btn btn-secondary">
                            <i data-lucide="user-plus"></i>
                            <span>Add Personal</span>
                        </button>
                    </div>
                    <div class="personal-grid" id="personal-grid">
                        <!-- Personal Cards will be injected here -->
                    </div>
                </div>

                <!-- Activity Log View -->
                <div id="logs-view" class="view">
                    <div class="logs-header">
                        <h2>System Activity Logs</h2>
                        <button id="clear-logs-btn" class="btn btn-danger">
                            <i data-lucide="trash-2"></i>
                            <span>Clear Logs</span>
                        </button>
                    </div>
                    <div class="logs-container">
                        <table class="logs-table">
                            <thead>
                                <tr>
                                    <th>Action</th>
                                    <th>Task/Details</th>
                                    <th>Department</th>
                                    <th>Owner</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="logs-tbody">
                                <!-- Log rows will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Create New Task</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-name">Task Name</label>
                    <input type="text" id="task-name" placeholder="Enter task name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-department">Department</label>
                        <select id="task-department" required>
                            <option value="Product Research">Product Research</option>
                            <option value="Product Development">Product Development</option>
                            <option value="Product Marketing">Product Marketing</option>
                            <option value="Product Selling">Product Selling</option>
                            <option value="Accounts & Finance">Accounts & Finance</option>
                            <option value="Client Success">Client Success</option>
                            <option value="HR Department">HR Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-progress">Progress (%)</label>
                        <input type="number" id="task-progress" min="0" max="100" value="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-responsible">Responsible Person(s)</label>
                    <div id="personal-selector" class="personal-selector">
                        <!-- Checkboxes or multiselect will be here -->
                        <div id="selected-personal-list" class="tag-list"></div>
                        <select id="personal-dropdown">
                            <option value="">Select Personal...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="task-due-date">Due Date</label>
                    <input type="date" id="task-due-date">
                </div>
                <div class="form-group">
                    <label for="task-description">Description</label>
                    <textarea id="task-description" placeholder="Optional details..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-task-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Personal Modal -->
    <div id="personal-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Team Member (Personal)</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="personal-form">
                <input type="hidden" id="person-id">
                <div class="form-group">
                    <label for="person-name">Full Name</label>
                    <input type="text" id="person-name" placeholder="Enter name" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="person-role">Role</label>
                        <input type="text" id="person-role" placeholder="e.g. Lead Researcher" required>
                    </div>
                    <div class="form-group">
                        <label for="person-dept">Department</label>
                        <select id="person-dept">
                            <option value="Product Research">Product Research</option>
                            <option value="Product Development">Product Development</option>
                            <option value="Product Marketing">Product Marketing</option>
                            <option value="Product Selling">Product Selling</option>
                            <option value="Accounts & Finance">Accounts & Finance</option>
                            <option value="Client Success">Client Success</option>
                            <option value="HR Department">HR Department</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="person-email">Email Address</label>
                    <input type="email" id="person-email" placeholder="email@company.com">
                </div>
                <div class="form-group">
                    <label for="person-responsibility">Core Responsibility</label>
                    <textarea id="person-responsibility" placeholder="What does this person handle?"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Member</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification-container"></div>

    <script src="app.js"></script>
</body>
</html>
